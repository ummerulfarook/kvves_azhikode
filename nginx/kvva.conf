worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    # ─── KVVA Management System ───────────────────────────────────────────
    server {
        listen 80;
        server_name localhost 127.0.0.1;

        # Frontend (React SPA) — built static files
        root C:/kvva/frontend/dist;
        index index.html;

        # React Router — serve index.html for all routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Django API — proxy to Waitress backend
        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # Django admin
        location /admin/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Media files (uploaded photos, documents)
        location /media/ {
            alias C:/kvva/media/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Django static files (admin CSS/JS)
        location /static/ {
            alias C:/kvva/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Security headers
        add_header X-Frame-Options "DENY";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
    }
}
